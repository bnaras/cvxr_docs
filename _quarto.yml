format:
  html:
    theme:
      - cosmo
      - custom.scss
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: false
    code-copy: true
    highlight-style: github
    mainfont: "Georgia, 'Times New Roman', serif"
    monofont: "SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    link-external-newwindow: true

bibliography: references.bib
