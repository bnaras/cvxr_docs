project:
  type: website
  output-dir: _site
  resources:
    - "images/**"
    - "reference/viz/**"
  render:
    - "*.qmd"
    - "examples/**/*.qmd"
    - "reference/**/*.qmd"

website:
  title: "CVXR"
  description: "Disciplined Convex Programming in R"
  site-url: "https://cvxr.rbind.io/"
  repo-url: "https://github.com/cvxgrp/CVXR"
  repo-actions: [issue]
  search:
    location: sidebar
    type: textbox
  page-navigation: true
  navbar:
    logo: images/logo.png
    background: white
    foreground: dark
    left:
      - text: Home
        href: index.qmd
      - text: "What's New"
        href: whatsnew.qmd
      - text: "Package Docs"
        href: "https://www.cvxgrp.org/CVXR"
    right:
      - icon: github
        href: "https://github.com/cvxgrp/CVXR"
  sidebar:
    style: floating
    search: true
    contents:
      - text: "Home"
        href: index.qmd
      - text: "What's New in 1.8.x"
        href: whatsnew.qmd
      - section: "Getting Started"
        contents:
          - text: "Quick Introduction"
            href: examples/intro.qmd
          - text: "Longer Introduction"
            href: examples/gentle-intro.qmd
      - section: "Basic Examples"
        contents:
          - text: "Least Squares"
            href: examples/basic/least-squares.qmd
          - text: "Linear Program"
            href: examples/basic/linear-program.qmd
          - text: "Quadratic Program"
            href: examples/basic/quadratic-program.qmd
